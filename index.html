<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBITI | Prichádzame čoskoro</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="mesh-bg"></div>
    <div class="glow-orb top"></div>
    <div class="glow-orb bottom"></div>
    
    <div class="hero-wrapper">
        <main class="container">
        
        <div class="logo-container">
            <h1 class="logo-text">
                <span class="animated-q">Q</span><span class="logo-remainder">BITI</span>
            </h1>
        </div>
        
        <div class="contact">
            <a href="mailto:qbiti@qbiti.cz" class="btn">qbiti@qbiti.cz</a>
        </main>
        
        <a href="#repasit" class="scroll-arrow" aria-label="Zoobraziť viac">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </a>
    </div>

    <!-- Repasit Portal Section -->
    <section id="repasit" class="repasit-section">
        <div class="container secondary-container">
            <h2 class="repasit-heading">Náš E-shop</h2>
            <div class="logo-container">
                <div class="logo-text repasit-logo">
                    REPAS<span class="animated-q repasit-accent">it</span>
                </div>
            </div>
            <p class="repasit-desc">Prémiová repasovaná technika pre firmy aj domácnosti.</p>
            <a href="https://repasit.qbiti.cz" class="btn btn-primary" target="_blank" rel="noopener">Navštíviť E-shop</a>
        </div>
    </section>

    <script>
        // Jemná fade-in animácia celej karty po načítaní
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.querySelector('.container').classList.add('visible');
            }, 150);
        });
    </script>
</body>
</html>
