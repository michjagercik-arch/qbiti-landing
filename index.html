<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBITI | Prichádzame čoskoro</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@800;900&family=Pacifico&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <!-- Background Elements -->
    <div class="mesh-bg"></div>
    <div class="glow-orb top"></div>
    <div class="glow-orb bottom"></div>
    
    <div class="scroll-container" id="scrollContainer">
        <div class="hero-wrapper">
            <main class="container">
                <div class="logo-container">
                    <h1 class="logo-text">
                        <span class="animated-q">Q</span><span class="logo-remainder">BITI</span>
                    </h1>
                </div>
                <div class="contact">
                    <a href="mailto:qbiti@qbiti.cz" class="btn">qbiti@qbiti.cz</a>
                </div>
            </main>
            
            <button id="goDown" class="scroll-arrow" aria-label="Zoobraziť viac">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
        </div>

        <!-- Repasit Portal Section -->
        <section id="repasit" class="repasit-section">
            <button id="goUp" class="scroll-arrow up-arrow" aria-label="Naspäť hore">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
            </button>
            <div class="container secondary-container">
                <div class="logo-group-repasit">
                    <span class="logo-repasit">REPAS<span class="accent-repasit">it</span></span>
                    <span class="sub-logo-repasit">by QBITI</span>
                </div>
                <p class="repasit-desc">Prémiová repasovaná technika pre firmy aj domácnosti.</p>
                <a href="https://repasit.qbiti.cz" class="btn btn-primary" target="_blank" rel="noopener">Navštíviť E-shop</a>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.querySelectorAll('.container').forEach(c => c.classList.add('visible'));
            }, 150);
            
            const btnDown = document.getElementById('goDown');
            const btnUp = document.getElementById('goUp');
            const scrollContainer = document.getElementById('scrollContainer');
            
            btnDown.addEventListener('click', (e) => {
                e.preventDefault();
                scrollContainer.style.transform = 'translateY(-100vh)';
            });
            
            btnUp.addEventListener('click', (e) => {
                e.preventDefault();
                scrollContainer.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>
</html>
